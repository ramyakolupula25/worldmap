apiVersion: argoproj.io/v1alpha1
kind: AppProject

metadata:
  name: world-info-project
  namespace: argocd

spec:
  description: World Info Application Project

  sourceRepos:
    - '*'

  destinations:
    - namespace: default
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'